<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg-sl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#4b5563"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg-sl)"/>
  <!-- Initialen-Kreis -->
  <circle cx="200" cy="160" r="80" fill="rgba(245,200,0,0.18)" stroke="#f5c800" stroke-width="3"/>
  <text x="200" y="190" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="76" font-weight="800" fill="#f5c800">SL</text>
  <!-- Name -->
  <text x="200" y="295" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="28" font-weight="700" fill="#ffffff" letter-spacing="2">STEFAN LUTZ</text>
  <!-- Rolle -->
  <text x="200" y="330" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="18" font-weight="400" fill="rgba(255,255,255,0.7)">Inhaber &amp; Verkauf</text>
  <!-- Hinweis -->
  <text x="200" y="370" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="12" font-weight="400" fill="rgba(255,255,255,0.4)" letter-spacing="1">PLATZHALTER · Foto austauschen</text>
</svg>
