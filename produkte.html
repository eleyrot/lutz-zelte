<!DOCTYPE html>
<!--
  produkte.html — Lutz Zelte GmbH
  Zweck: Vollständige Produktübersicht mit Filter-Tabs.
  Filter: Alle / Serie 1 / Serie 2 / Occasion / Vermietung
-->
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Produkte – Lutz Zelte | ProfiLine Faltzelte Schweiz</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components/header.css" />
  <link rel="stylesheet" href="css/components/footer.css" />
  <link rel="stylesheet" href="css/components/products.css" />
  <link rel="stylesheet" href="css/components/produkte-seite.css" />
</head>
<body>

  <!-- =====================================================================
       HEADER
       ===================================================================== -->
  <header class="header" id="top">
    <div class="container header__inner">

      <a href="index.html" class="header__logo" aria-label="Lutz Zelte – zur Startseite">
        <img src="assets/images/logos/lutz-zelte-logo.png" alt="ProfiLine – Lutz Zelte Altenrhein" width="180" height="60" />
      </a>

      <button class="header__menu-toggle" aria-label="Navigation öffnen" aria-expanded="false" aria-controls="main-nav">
        <span></span><span></span><span></span>
      </button>

      <nav class="nav" id="main-nav" aria-label="Hauptnavigation">
        <ul class="nav__list">
          <li><a class="nav__link" href="index.html#verleih">Verleih</a></li>
          <li><a class="nav__link nav__link--active" href="produkte.html">Produkte</a></li>
          <li><a class="nav__link" href="index.html#galerie">Galerie</a></li>
          <li><a class="nav__link" href="index.html#ueber-uns">Über uns</a></li>
          <li><a class="nav__link nav__link--cta" href="index.html#kontakt">Kontakt</a></li>
        </ul>
      </nav>

    </div>
  </header>

  <main>

    <!-- ===================================================================
         PRODUKTE — Seitenheader
         =================================================================== -->
    <section class="produkte-hero">
      <div class="container">
        <h1 class="produkte-hero__title">Unsere Zelte.</h1>
        <p class="produkte-hero__subtitle">Faltzelte, Occasionen und Mietzelte – direkt anfragbar. Alle Preise exkl. MwSt.</p>
      </div>
    </section>

    <!-- ===================================================================
         FILTER-TABS + PRODUKT-GRID
         =================================================================== -->
    <section class="section" aria-labelledby="produkte-title">
      <div class="container">

        <div class="filter-tabs" id="produkte-tabs" role="tablist" aria-label="Produkte filtern">
          <!-- Tabs werden per JS eingefügt -->
        </div>

        <div id="produkte-alle" aria-live="polite">
          <p class="produkte__laden">Zelte werden geladen…</p>
        </div>

      </div>
    </section>

  </main>

  <!-- =====================================================================
       FOOTER
       ===================================================================== -->
  <footer class="footer" aria-label="Seitenfuss">
    <div class="container footer__inner">
      <p class="footer__copy">&copy; 2025 Lutz Zelte GmbH · Altenrhein · <a href="#">Impressum</a> · <a href="#">Datenschutz</a></p>
    </div>
  </footer>

  <script src="js/main.js" type="module" defer></script>

</body>
</html>
